name: Backend CI

on:
  push:
    branches: ["**"]
    paths: ["backend/**"]
  pull_request:
    branches: ["main"]
    paths: ["backend/**"]

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy app

  test:
    name: Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mw_user
          POSTGRES_PASSWORD: mw_pass
          POSTGRES_DB: mw_stockmarket_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret-key
      DATABASE_URL: postgresql+asyncpg://mw_user:mw_pass@localhost:5432/mw_stockmarket_test
      DATABASE_URL_SYNC: postgresql://mw_user:mw_pass@localhost:5432/mw_stockmarket_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "true"
      YOUTUBE_API_KEY: ""
      OPENAI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest --cov=app --cov-report=xml -v

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
